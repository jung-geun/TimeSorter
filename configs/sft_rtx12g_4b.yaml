# Stage 2 SFT — 12GB VRAM (RTX 3060/4070/4080 등), Qwen3-4B QLoRA 4-bit
# 모델 weights ~2.5GB (NF4 double quant) + LoRA + 활성화 → 총 ~8-10GB 예상
# effective batch = 4 × 8 = 32 (DGX와 동일)
model_name: Qwen/Qwen3.5-4B
dataset: data/scheduler_ko_combined.parquet
output_dir: outputs/sft_rtx12g_4b
max_samples: null
ko_ultrafeedback_n: 500
max_seq_length: 2048

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  use_4bit: true          # NF4 QLoRA — x86_64 CUDA 필수

training_args:
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 32   # effective batch = 32
  num_train_epochs: 5
  learning_rate: 2.0e-5
  gradient_checkpointing: true      # 활성화 재계산으로 VRAM 절감
  packing: true                     # 짧은 시퀀스 묶어 패딩 낭비 제거
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  logging_steps: 10
  save_steps: 100
  save_strategy: "steps"
  report_to: "wandb"
  remove_unused_columns: false
  dataloader_num_workers: 2
  optim: "adamw_8bit"
