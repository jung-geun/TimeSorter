# Mac MPS SFT smoke — Qwen3-1.7B, ko_Ultrafeedback scheduling 필터, 2 steps
model_name: Qwen/Qwen3.5-2B
dataset: data/scheduler_ko.parquet
output_dir: outputs/sft_mac_smoke
max_samples: 64
max_seq_length: 1024

lora:
  r: 8
  alpha: 16
  dropout: 0.05
  use_4bit: false

training_args:
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 2
  max_steps: 2
  learning_rate: 2.0e-5
  gradient_checkpointing: false
  warmup_ratio: 0.0
  lr_scheduler_type: "cosine"
  logging_steps: 1
  save_strategy: "no"
  report_to: "wandb"
  remove_unused_columns: false
