# Stage 3 DPO v2 — JSON 스키마 + 4축 점수 라벨링
# SFT v2 체크포인트(outputs/sft_rtx12g_4b_v2)에서 이어 학습
# schema_version: v2 → _apply_system_to_dpo가 system prompt를 DPO prompt에 삽입
model_name: Qwen/Qwen3-4B-Instruct-2507
sft_adapter: outputs/sft_rtx12g_4b_v2
dataset: data/dpo_pairs_v2.parquet
output_dir: outputs/dpo_rtx12g_4b_v2
max_samples: null
max_prompt_len: 768           # JSON system prompt 길이 반영
schema_version: "v2"

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  use_4bit: true

training_args:
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 32
  num_train_epochs: 2
  max_length: 1536
  max_prompt_length: 768
  beta: 0.1
  learning_rate: 5.0e-7
  gradient_checkpointing: true
  warmup_ratio: 0.05
  lr_scheduler_type: "cosine"
  logging_steps: 10
  save_strategy: "epoch"
  report_to: "wandb"
  remove_unused_columns: false
  dataloader_num_workers: 2
  optim: "adamw_8bit"
