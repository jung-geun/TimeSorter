model_name: Qwen/Qwen3.5-4B
dataset: data/scheduler_ko_combined.parquet
output_dir: outputs/sft_auto
max_samples: null
ko_ultrafeedback_n: 500
max_seq_length: 2048

# VRAM에 따라 bs / grad_accum / use_4bit 자동 산출 (target eff_batch=32)
auto_batch: true
target_eff_batch: 32

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  use_4bit: false  # auto_batch=true 시 VRAM 기반으로 덮어씀

training_args:
  num_train_epochs: 5
  learning_rate: 2.0e-5
  gradient_checkpointing: true
  gradient_checkpointing_kwargs:
    use_reentrant: false
  packing: true
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  logging_steps: 10
  save_steps: 100
  save_strategy: "steps"
  report_to: "wandb"
  remove_unused_columns: false
  dataloader_num_workers: 4
  optim: "adamw_torch_fused"
