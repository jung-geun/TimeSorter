model_name: Qwen/Qwen3.5-4B
dataset: data/scheduler_v2_combined.parquet
output_dir: outputs/sft_auto_v2
max_samples: null
ko_ultrafeedback_n: 0
max_seq_length: 2048
schema_version: "v2"

auto_batch: true
target_eff_batch: 32

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  use_4bit: false

training_args:
  num_train_epochs: 3
  learning_rate: 2.0e-5
  gradient_checkpointing: true
  gradient_checkpointing_kwargs:
    use_reentrant: false
  packing: true
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  logging_steps: 10
  save_strategy: "epoch"
  report_to: "wandb"
  remove_unused_columns: false
  dataloader_num_workers: 4
  optim: "adamw_torch_fused"
