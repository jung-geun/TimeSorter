# Stage 1 SFT — DGX Spark (ARM64, 120GB VRAM) / RTX 4090 x86_64 겸용
# 4B 모델 bf16 LoRA. 120GB에서 bs=16 충분 (~40GB 사용 예상)
model_name: Qwen/Qwen3-4B-Instruct-2507
dataset: data/scheduler_ko.parquet
output_dir: outputs/sft_dgx_4b
max_samples: null
max_seq_length: 2048

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  use_4bit: false  # ARM64 bnb 미지원. x86_64(RTX 4090)에서는 device.py가 자동 활성화

training_args:
  per_device_train_batch_size: 16
  gradient_accumulation_steps: 2     # effective batch = 32
  num_train_epochs: 2
  learning_rate: 2.0e-5
  gradient_checkpointing: true
  gradient_checkpointing_kwargs:
    use_reentrant: false             # 더 안정적이고 activation 메모리 절감
  packing: true                      # 짧은 시퀀스를 max_seq_length로 묶어 패딩 낭비 제거
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  logging_steps: 10
  save_steps: 200
  save_strategy: "steps"
  report_to: "wandb"
  remove_unused_columns: false
  dataloader_num_workers: 4
  optim: "adamw_torch_fused"         # fused AdamW: Blackwell에서 더 빠름
