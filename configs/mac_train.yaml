# MacBook Pro (Apple Silicon MPS) — 실제 학습용
# Qwen3-1.7B + bf16 LoRA, PYTORCH_ENABLE_MPS_FALLBACK=1 필요
model_name: Qwen/Qwen3.5-2B
dataset: data/ko_Ultrafeedback_binarized.parquet
output_dir: outputs/mac_1.7b
max_samples: null
max_prompt_len: 1024

lora:
  r: 8
  alpha: 16
  dropout: 0.05
  use_4bit: false

training_args:
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  num_train_epochs: 1
  max_length: 2048
  max_prompt_length: 1024
  beta: 0.1
  learning_rate: 1.0e-6
  gradient_checkpointing: false  # MPS에서 불안정 가능 — off 유지
  warmup_ratio: 0.05
  lr_scheduler_type: "cosine"
  logging_steps: 10
  save_steps: 200
  save_strategy: "steps"
  report_to: "wandb"
  remove_unused_columns: false
