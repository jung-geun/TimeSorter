model_name: Qwen/Qwen3-1.7B
dataset: data/ko_Ultrafeedback_binarized.parquet
output_dir: outputs/mac_smoke
max_samples: 32
max_prompt_len: 256

lora:
  r: 8
  alpha: 16
  dropout: 0.05
  use_4bit: false

training_args:
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 1
  max_steps: 2
  max_length: 512
  max_prompt_length: 256
  learning_rate: 5.0e-5
  gradient_checkpointing: false
  logging_steps: 1
  save_strategy: "no"
  report_to: "none"
  remove_unused_columns: false
